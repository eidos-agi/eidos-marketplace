<div class="bluf">
  <div class="bluf-label">Bottom Line Up Front</div>
  <div class="bluf-summary">{{ bluf_text }}</div>
  <div class="bluf-counts">
    <span class="bluf-count crit">{{ criticals|length }} critical</span>
    <span class="bluf-count warn">{{ warnings|length }} warning</span>
    <span class="bluf-count info">{{ infos|length }} info</span>
  </div>
</div>
